services:

  init-permissions:
    image: alpine
    volumes:
      - ./models:/opt/airflow/models
      - ./scripts:/opt/airflow/scripts
      - ./dags:/opt/airflow/dags
    command: sh -c "chmod -R 777 /opt/airflow/models /opt/airflow/scripts /opt/airflow/dags"

  postgres:
    container_name: postgres_container
    image: postgres:14.22
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./postgres/data:/var/lib/postgresql/data
    networks:
      - my-network
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}", "-d", "${POSTGRES_DB}"]
      interval: 5s
      retries: 3
  
  af:
    container_name: airflow_container
    image: apache/airflow:3.0.0
    ports:
      - 8000:8080
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@postgres:5432/${AIRFLOW_DB_NAME}
      AIRFLOW__CORE__HOSTNAME_CALLABLE: 'airflow.utils.net.get_host_ip_address'
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./scripts:/opt/airflow/scripts
      - ./secrets/kaggle.json:/home/airflow/.kaggle/kaggle.json
      - ./data:/opt/airflow/data
      - /var/run/docker.sock:/var/run/docker.sock
      - ./models:/opt/airflow/models
    group_add:
      - '1001'
    depends_on:
      postgres:
        condition: service_healthy
      init-permissions:
        condition: service_completed_successfully
    networks:
      - my-network
    command: >
        bash -c "pip install -r /opt/airflow/scripts/requirements.txt && airflow db migrate && airflow standalone"

  fastapi:
    container_name: fastapi_container
    build: ./fastapi
    ports:
      - "8001:8000"
    volumes:
      - ./models:/models
      - ./fastapi:/app
    depends_on:
      - postgres
      - af
    networks:
      - my-network
    restart: unless-stopped
  
networks:
  my-network:
    driver: bridge